<!-- cart.html -->
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Cart - Demo Shop</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://assets.adobedtm.com/01296dd00565/a7688a1e27f2/launch-4ef5df62b439-development.min.js" async></script>
</head>
<body>
<header>
  <h1>Demo Shop</h1>
  <nav>
    <a href="index.html">Home</a> |
    <a href="cart.html">Cart</a> |
    <a href="checkout.html">Checkout</a>
  </nav>
  <div id="cart-count">Cart: 0 items</div>
</header>

<main class="container">
  <h2>Your Cart</h2>
  <div id="cart-items" class="cart-list"></div>
  <div id="cart-total" class="cart-total"></div>
  <div class="actions">
    <button onclick="goToCheckout()">Proceed to Checkout</button>
    <a class="link" href="index.html">Continue Shopping</a>
  </div>
</main>

<footer>
  <p>Demo site with <code>window.dataLayer</code> and <code>window.adobeDataLayer</code> pushes.</p>
</footer>

<script src="main.js"></script>
<script>
initPage('cart').then(function(){
  var itemsDiv = document.getElementById('cart-items');
  var cart = getCart();
  if(cart.length===0) itemsDiv.textContent='Cart is empty';
  cart.forEach(function(i){
    var el = document.createElement('div');
    el.className = 'cart-item';
    el.innerHTML = '<div class="ci-left"><div class="ci-name">'+escapeHtml(i.name)+'</div><div class="ci-qty">Qty: '+i.qty+'</div></div>' +
                   '<div class="ci-right"><div class="ci-price">$'+(i.price*i.qty).toFixed(2)+'</div>' +
                   '<div class="ci-actions"><button onclick="removeFromCart(\''+i.id+'\')">Remove</button>' +
                   '<a class="link" href="product.html?id='+i.id+'">View</a></div></div>';
    itemsDiv.appendChild(el);
  });
  var totalEl = document.getElementById('cart-total');
  var total = cart.reduce(function(s,i){return s+i.price*i.qty;},0);
  totalEl.textContent = 'Total: $' + total.toFixed(2);
});
</script>
</body>
</html>
