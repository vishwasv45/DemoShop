<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Newsletter - Demo Shop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <h1>Demo Shop</h1>
  <nav>
    <a href="index.html">Home</a> |
    <a href="newsletter.html">Newsletter</a>
  </nav>
  <div id="cart-count">Cart: 0 items</div>
</header>

<main class="container">
  <h2>Newsletter Signup</h2>
  <div class="form">
    <input id="newsletter-email" placeholder="Email" />
    <div class="actions">
      <button onclick="(function(){ newsletterSignup(document.getElementById('newsletter-email').value); alert('Subscribed to newsletter (simulated)'); })()">Subscribe</button>
    </div>
  </div>
</main>

<footer>
  <p>Demo site with <code>window.dataLayer</code> and <code>window.adobeDataLayer</code> pushes.</p>
</footer>

<script src="main.js"></script>
<script>
initPage('newsletter');
</script>
</body>
</html>
