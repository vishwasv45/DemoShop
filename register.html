<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>Register - Demo Shop</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
<header>
  <h1>Demo Shop</h1>
  <nav>
    <a href="index.html">Home</a> |
    <a href="login.html">Login</a> |
    <a href="register.html">Register</a>
  </nav>
  <div id="cart-count">Cart: 0 items</div>
</header>

<main class="container">
  <h2>Register</h2>
  <div class="form">
    <input id="reg-name" placeholder="Name" />
    <input id="reg-email" placeholder="Email" />
    <div class="actions">
      <button onclick="(function(){ registerUser(document.getElementById('reg-name').value, document.getElementById('reg-email').value); alert('Registered (simulated)'); })()">Register</button>
      <a class="link" href="login.html">Login</a>
    </div>
  </div>
</main>

<footer>
  <p>Demo site with <code>window.dataLayer</code> and <code>window.adobeDataLayer</code> pushes.</p>
</footer>

<script src="main.js"></script>
<script>
initPage('register');
</script>
</body>
</html>
